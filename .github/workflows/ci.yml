name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: we-together-skill
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pytest ruff mypy

      - name: Ruff check
        run: .venv/bin/python -m ruff check src scripts

      - name: Mypy (advisory)
        run: .venv/bin/python -m mypy src/we_together || true

      - name: Pytest
        run: .venv/bin/python -m pytest -q

      - name: E2E smoke
        run: bash scripts/e2e_smoke.sh
